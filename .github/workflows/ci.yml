name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
  schedule:
    - cron: '15 10 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint & Test
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  trivy-image-scan:
    name: Trivy Image Scan
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          pull: true
          tags: ppcollection:scan-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ppcollection:scan-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignorefile: .trivyignore.yaml
          format: table
          output: trivy-image-results.txt

      - name: Generate Trivy SARIF
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ppcollection:scan-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignorefile: .trivyignore.yaml
          format: sarif
          output: trivy-image-results.sarif

      - name: Upload Trivy image report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-image-scan-report
          path: |
            trivy-image-results.txt
            trivy-image-results.sarif
          retention-days: 30

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image
          wait-for-processing: true

  trivy-fs-scan:
    name: Trivy FS Scan
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Scan repository with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignorefile: .trivyignore.yaml
          format: table
          output: trivy-fs-results.txt

      - name: Generate Trivy FS SARIF
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignorefile: .trivyignore.yaml
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload Trivy FS report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-fs-scan-report
          path: |
            trivy-fs-results.txt
            trivy-fs-results.sarif
          retention-days: 30

      - name: Upload Trivy FS SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs
          wait-for-processing: true
