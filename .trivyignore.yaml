# Trivy exception policy for PPCollection.
# Keep this file small and time-bounded.
# Rules:
# - Scope to the exact CVE/package/path
# - Include business justification
# - Include owner and expiration date
# - Remove entries once fixed
#
# Example:
# vulnerabilities:
#   - id: CVE-2026-12345
#     statement: "Non-exploitable in PPCollection because vulnerable code path is unused."
#     paths:
#       - "usr/lib/libexample.so"
#     expired_at: "2026-06-30"
#     owner: "gogorichie"
#
# misconfigurations:
#   - id: AVD-DS-0001
#     statement: "Temporary exception while migration is in progress."
#     paths:
#       - "Dockerfile"
#     expired_at: "2026-05-01"
#     owner: "gogorichie"

vulnerabilities:
  - id: GHSA-3v7f-55p6-f55p
    statement: >-
      Picomatch 4.0.0-4.0.3 method-injection / incorrect glob match, but only
      present in the copy of picomatch bundled inside the `npm` CLI tarball
      that ships with @semantic-release/npm. This npm CLI runs only in the
      release pipeline in CI to read package.json metadata; it never matches
      user-supplied glob patterns. The host top-level picomatch is pinned to
      ^4.0.4 via package.json overrides. Re-evaluate once @semantic-release/npm
      ships an npm tarball with patched picomatch.
    paths:
      - "node_modules/npm/node_modules/tinyglobby/node_modules/picomatch"
    expired_at: "2026-07-05"
    owner: "gogorichie"
  - id: GHSA-c2c7-rcm5-vvqj
    statement: >-
      Same picomatch 4.0.0-4.0.3 ReDoS advisory (companion to
      GHSA-3v7f-55p6-f55p). See justification above.
    paths:
      - "node_modules/npm/node_modules/tinyglobby/node_modules/picomatch"
    expired_at: "2026-07-05"
    owner: "gogorichie"
misconfigurations: []
secrets: []
licenses: []
