# Trivy exception policy for PPCollection.
# Keep this file small and time-bounded.
# Rules:
# - Scope to the exact CVE/package/path
# - Include business justification
# - Include owner and expiration date
# - Remove entries once fixed
#
# Example:
# vulnerabilities:
#   - id: CVE-2026-12345
#     statement: "Non-exploitable in PPCollection because vulnerable code path is unused."
#     paths:
#       - "usr/lib/libexample.so"
#     expired_at: "2026-06-30"
#     owner: "gogorichie"
#
# misconfigurations:
#   - id: AVD-DS-0001
#     statement: "Temporary exception while migration is in progress."
#     paths:
#       - "Dockerfile"
#     expired_at: "2026-05-01"
#     owner: "gogorichie"

vulnerabilities:
  - id: CVE-2026-33672
    statement: "Picomatch 4.0.0-4.0.3 method-injection (GHSA-3v7f-55p6-f55p). Only present in the picomatch copy bundled inside @semantic-release/npm's npm CLI tarball, which runs only in the CI release pipeline against package.json metadata and never matches user-supplied glob patterns. Host top-level picomatch is pinned to ^4.0.4 via package.json overrides. Re-evaluate once @semantic-release/npm ships an npm tarball with patched picomatch. owner: gogorichie."
    paths:
      - "node_modules/npm/node_modules/tinyglobby/node_modules/picomatch"
    expired_at: 2026-07-05T00:00:00Z
  - id: CVE-2026-33671
    statement: "Same picomatch 4.0.0-4.0.3 ReDoS advisory (GHSA-c2c7-rcm5-vvqj, companion to CVE-2026-33672). See justification above. owner: gogorichie."
    paths:
      - "node_modules/npm/node_modules/tinyglobby/node_modules/picomatch"
    expired_at: 2026-07-05T00:00:00Z
misconfigurations: []
secrets: []
licenses: []
