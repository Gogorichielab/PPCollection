# Trivy exception policy for PPCollection.
# Keep this file small, scoped, and time-bounded.
#
# Rules:
# - Scope to the exact CVE/package/path
# - Include business justification
# - Include expiration date
# - Remove entries once fixed upstream

vulnerabilities:
