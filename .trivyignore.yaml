    purls:
      - "pkg:npm/picomatch@4.0.3"
    paths:
      - "package-lock.json"
      - "node_modules/npm/node_modules/tinyglobby/node_modules/picomatch/package.json"
    expired_at: "2026-07-05"
    statement: >-
      Temporary exception for picomatch 4.0.3 method-injection advisory
      GHSA-3v7f-55p6-f55p. The only remaining affected copy is bundled
      inside @semantic-release/npm's npm CLI tarball and is used only by the
      CI release pipeline against repository-controlled package metadata, not
      user-supplied glob patterns. Top-level picomatch is pinned to 4.0.4 via
      package.json overrides. Owner: gogorichie. Remove after @semantic-release
      pulls npm >=11.13.0 or another npm tarball with picomatch >=4.0.4.
